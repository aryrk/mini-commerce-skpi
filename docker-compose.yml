version: '3.8'

services:
  catalog-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: catalog_db

  catalog-app:
    build:
      context: .
      dockerfile: docker/catalog.Dockerfile
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://catalog-db:5432/catalog_db
      DB_USERNAME: user
      DB_PASSWORD: password
    depends_on:
      - catalog-db

  order-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: order_db

  order-app:
    build:
      context: .
      dockerfile: docker/order.Dockerfile
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://order-db:5432/order_db
      DB_USERNAME: user
      DB_PASSWORD: password
      CATALOG_SERVICE_URL: http://catalog-app:8081
    depends_on:
      - order-db
      - catalog-app